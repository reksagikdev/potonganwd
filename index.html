<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WD BANK KECIL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family: 'Inter', sans-serif;
    letter-spacing:0.3px;

}
	
	body {
    min-height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: url("bg/gambar34.jpg") center/cover no-repeat;
    
    }

html, body {
    
    margin: 0;
    padding: 0;
    height: auto;

}

.title{
    color:white;
    font-size:24px;
    margin-bottom:12px;
    letter-spacing:2px;
    text-align:center;
    text-shadow:0 4px 12px rgba(0,0,0,.4);

    position:relative;
    padding-bottom:5px;
}

.title::after{
    content:"";
    position:absolute;

    left:50%;
    bottom:0;

    transform:translateX(-50%);

    width:200px;
    height:3px;

    border-radius:10px;

    background:linear-gradient(
        90deg,
        transparent,
        #60a5fa,
        #ffffff,
        #60a5fa,
        transparent
    );

    box-shadow:
        0 0 10px rgba(96,165,250,0.7),
        0 0 18px rgba(255,255,255,0.35);
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(4px);
    z-index:0;
	pointer-events: none;
}
    
.container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;

    margin: 40px auto;
    padding: 26px 22px 18px;

    border-radius: 25px;
    background: url("bg/gambar34.jpg")center;
    border: 1px solid rgba(59, 130, 246, 0.7);
    box-shadow: 0 0 12px rgba(59,130,246,0.25);
    color: #ffffff;

    text-align: center;

    overflow: visible;
    }

    h2 {
        margin-bottom: 20px;
        font-weight: 500;
    }

    .input-box {
    background:#0b1120;

    border: 1px solid rgba(59, 130, 246, 0.7);

    box-shadow:
        0 0 12px rgba(59,130,246,0.25),
        inset 0 1px 2px rgba(255,255,255,0.03);

    border-radius: 15px;

    padding: 15px;
    margin-bottom: 15px;
}

    input {
    width: 100%;
    border: none;
    outline: none;

    background: transparent;

    color: white;

    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;

    text-align: center;
}

    input::placeholder {
        color: #64748b;
    }

    .result-box {
        background: rgba(2, 6, 23, 0.6);
    border: 1px solid rgba(59, 130, 246, 0.7);
    box-shadow: 0 0 12px rgba(59,130,246,0.25);
    color: #ffffff;
    border-radius: 10px;
    padding: 10px 10px;
    margin: 0 auto 20px;
    width: 200px;
    
    display: flex;
    flex-direction: column;
    align-items: center;   /* horizontal center */
    justify-content: center; /* vertical center */
    }

    .result-label {
        font-size: 14px;
        color: #94a3b8;
    }

    .result-value {
        font-size: 22px;
        font-weight: bold;
        color: #93c5fd;
        margin-top: 5px;
    }

    .buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: stretch;
}

    .btn {
         width: 100%;
    max-width: 150px;   
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(59, 130, 246, 0.7);
    font-weight: bold;
    cursor: pointer;
    color: #ffffff;
    transition: all 0.2s ease;
    will-change: transform;
    box-sizing: border-box;
	background: linear-gradient(135deg, #1e3a8a, #2563eb, #60a5fa);

    box-shadow: 0 6px 18px rgba(37,99,235,0.35);
    transition: all 0.25s ease;
	flex: 0 0 150px
	display: flex;
	align-items: center;
	justify-content: center;
    white-space: nowrap;
	min-height: 40px;
	 position: relative;
	 overflow: hidden;
    }

    .btn1 {
        background: linear-gradient(135deg, #1e3a8a, #0ea5e9);
		text-shadow:0 4px 12px rgba(0,0,0,.4);
    }

    .btn2 {
        background: linear-gradient(135deg, #1e3a8a, #0ea5e9);
		text-shadow:0 4px 12px rgba(0,0,0,.4);
    }

    .btn:hover {
        transform: translateY(-2px);
    }

.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -80%;
    width: 20%;
    height: 100%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
    );

    transform: skewX(-20deg);
    animation: shineMove 2.5s infinite;
}

@keyframes shineMove {
    0% {
        left: -80%;
    }
    100% {
        left: 130%;
    }
}

    .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #1e40af;
        padding: 12px 20px;
        border-radius: 8px;
        opacity: 0;
        transition: 0.3s;
    }

    .toast.show {
        opacity: 1;
    }
	
	.btn.success {
    background: linear-gradient(135deg, #16a34a, #22c55e, #4ade80);
    box-shadow: 0 10px 25px rgba(34,197,94,0.4);
}
	
.brand{
    position:relative;
    z-index:5;

    margin-top:-28px;

    text-align:center;

    color:#ffffff;
    font-size:10px;
    font-weight:700;

    letter-spacing:0.5px;

    text-shadow:
        0 1px 2px rgba(0,0,0,0.6);
}
	
.action-box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 16px;
	

    background: url("bg/gambar12.jpg")center;
    border: 1px solid rgba(59, 130, 246, 0.7);
    box-shadow: 0 0 12px rgba(59,130,246,0.25);
    color: #ffffff;
}
	
	h2 {
    color: #ffffff;
	 margin-top: -10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(59,130,246,0.5);
}
	
</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h2 class="title">⚡WD BANK KECIL⚡</h2>

    <div class="input-box">
        <input type="text" id="nominal" placeholder="Masukkan Nominal" oninput="formatRupiah(this)">
    </div>

    <div class="action-box">
    <div class="result-box">
        <div class="result-label">Hasil Setelah Admin</div>
        <div class="result-value" id="hasilText">-</div>
    </div>

    <div class="buttons">
        <button class="btn btn1" onclick="proses(6500, this)">COPY ADM 6.500</button>
        <button class="btn btn2" onclick="proses(2500, this)">COPY ADM 2.500</button>
    </div>
     </div>

</div> <!-- penutup container -->

<div class="brand">
    © 2026 | BY YOGIK
</div>

<div class="toast" id="toast">Copied!</div>

<script>
function formatRupiah(input) {
    let value = input.value.replace(/[^0-9]/g, '');

    if (value === "") {
        input.value = "";
        return;
    }

    input.value = new Intl.NumberFormat('en-US').format(value);
}

function proses(adm, btn) {
    let input = document.getElementById("nominal").value.replace(/,/g, '');

    if (!input) return;

    let nominal = parseInt(input);
    let hasil = nominal - adm;

    if (isNaN(hasil) || hasil < 0) {
        return;
    }

    let hasilFormat = new Intl.NumberFormat('en-US').format(hasil);

    document.getElementById("hasilText").innerText = "Rp " + hasilFormat;

    navigator.clipboard.writeText(hasilFormat);

    // 🔥 ubah jadi hijau
    btn.classList.add("success");

let teksAwal = btn.innerText;
btn.innerText = "✔";

setTimeout(() => {
    btn.classList.remove("success");
    btn.innerText = teksAwal;
}, 1500);
}

function resetButton(btn, adm) {
    if (adm === 6500) {
        btn.innerText = "COPY ADM 6,500";
    } else {
        btn.innerText = "COPY ADM 2,500";
    }
}

function showToast(text) {
    let toast = document.getElementById("toast");
    toast.innerText = text;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}
</script>

</body>
</html>
