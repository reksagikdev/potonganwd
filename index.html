<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WD BANK KECIL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family: 'Inter', sans-serif;
    letter-spacing:0.3px;

}
	
	body {
    min-height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background:url("bg/gambar4.jpg") center/cover no-repeat;
    
    }

html, body {
    
    margin: 0;
    padding: 0;
    height: auto;

}

.title{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    font-size:34px;
    font-weight:800;
    color:#ffffff;

    letter-spacing:2px;

    text-align:center;

    margin-top:28px;
    margin-bottom:12px;

    text-shadow:
        0 0 10px rgba(59,130,246,0.25);
}

.title-logo{
    width:50px;
    height:50px;
}


    
.container{
    max-width:460px;
    margin:0 auto 10px;
    padding:32px;

    border-radius:28px;

     background:
        linear-gradient(
            145deg,
            rgba(8,15,30,.92),
            rgba(2,6,23,.96)
        );

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter: blur(18px);

    box-shadow:
        0 20px 60px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.04);
}

.input-box{
    padding:18px;
    border-radius:16px;

    background: linear-gradient(145deg, #050b14, #0a0f1c);

    border:1px solid rgba(96,165,250,.18);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 8px 20px rgba(0,0,0,.25);

    margin-bottom:18px;

    transition:.25s;
}

.input-box:focus-within{
    border-color:#3b82f6;

    box-shadow:
        0 0 0 3px rgba(59,130,246,.15),
        0 10px 25px rgba(0,0,0,.3);
}

input{

width:100%;

background:none;


border:none;

outline:none;


font-size:17px;

font-weight:700;


color:white;

text-align:center;

}

input::placeholder{

color:#6b7280;

font-weight:500;

}

.result-box{
    padding:22px;
    border-radius:16px;

   
    background: linear-gradient(145deg, #050b14, #0a0f1c);

    border:1px solid rgba(34,197,94,.12);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 10px 25px rgba(0,0,0,.45);

    text-align:center;

    margin-bottom:22px;
}

.result-label{
    font-size:15px;

    color:#6b7280;
	letter-spacing:.5px;

    margin-bottom:8px;

    text-align:center;
}

.result-value{
    font-size:24px;
    font-weight:800;
    color:#22c55e;

    text-shadow:
        0 0 8px rgba(34,197,94,.25),
        0 0 18px rgba(34,197,94,.15);
}

    .buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: stretch;
}

    .btn{
    width:100%;
    max-width:150px;

    height:48px;

    padding:0 14px;

    border-radius:14px;

    border:0px solid rgba(96,165,250,.25);

    color:#ffffff;

    font-weight:700;
    font-size:13px;
    letter-spacing:.5px;

    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    white-space:nowrap;

    position:relative;
    overflow:hidden;

    background:
        linear-gradient(145deg, #1e3a8a, #2563eb);

    box-shadow:
        0 8px 18px rgba(30,58,138,.35),
        inset 0 1px 0 rgba(255,255,255,.08);

    transition:all .2s ease;
}

.btn:hover{
    transform:translateY(-2px);

    box-shadow:
        0 12px 25px rgba(30,58,138,.45),
        inset 0 1px 0 rgba(255,255,255,.1);
}

.btn:active{
    transform:translateY(0px) scale(.98);

    box-shadow:
        0 6px 14px rgba(30,58,138,.35);
}

    .btn1 {
        background: linear-gradient(135deg, #1e3a8a, #0ea5e9);
		text-shadow:0 4px 12px rgba(0,0,0,.4);
    }

    .btn2 {
        background: linear-gradient(135deg, #1e3a8a, #0ea5e9);
		text-shadow:0 4px 12px rgba(0,0,0,.4);
    }

    .btn:hover {
        transform: translateY(-2px);
    }

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-60%;

    width:40%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.25),
        transparent
    );

    transform:skewX(-20deg);

    animation:shineMove 3s infinite;
}

@keyframes shineMove{
    0%{ left:-60%; }
    100%{ left:140%; }
}

    .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #1e40af;
        padding: 12px 20px;
        border-radius: 8px;
        opacity: 0;
        transition: 0.3s;
    }

    .toast.show {
        opacity: 1;
    }
	
	.btn.success{
    background:linear-gradient(145deg, #16a34a, #22c55e);

    border:1px solid rgba(34,197,94,.3);

    box-shadow:
        0 10px 22px rgba(34,197,94,.35);
}
	
.brand{

margin-top:14px;

    display:block;
    width:fit-content;

    margin-left:auto;
    margin-right:auto;

    font-size:9px;

    font-weight:600;
    letter-spacing:0.6px;

    color:rgba(255,255,255,0.9);

    padding:2px 6px;   

    border-radius:6px;

    border:1px solid rgba(96,165,250,0.25);

    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    box-shadow:0 6px 18px rgba(0,0,0,0.2);
	text-shadow:
    0 1px 2px rgba(0,0,0,0.8),
    0 0 8px rgba(255,255,255,0.15);
}
	
.action-box{

    padding:22px;

    border-radius:18px;

    background:#0f172a;

    border:1px solid rgba(255,255,255,.05);

    margin-top:18px; 

}
	
	
</style>
</head>
<body>

<div class="overlay"></div>

<div class="title">
	<img src="bg/gambar3.png" alt="Logo" class="title-logo">
		POTONGAN WD
    </div>
	<div class="title-line"></div>

<div class="container">

    <div class="input-box">
        <input type="text" id="nominal" placeholder="Masukkan Nominal. . ." oninput="formatRupiah(this)">
    </div>

    <div class="action-box">
    <div class="result-box">
        <div class="result-label">Hasil Setelah Admin</div>
        <div class="result-value" id="hasilText">-</div>
    </div>

    <div class="buttons">
        <button class="btn btn1" onclick="proses(6500, this)">ADM 6.500</button>
        <button class="btn btn2" onclick="proses(2500, this)">ADM 2.500</button>
    </div>
     </div>

</div> 

<div class="brand">
    © 2026 | BY YOGIK
</div>

<div class="toast" id="toast">Copied!</div>

<script>
function formatRupiah(input) {
    let value = input.value.replace(/[^0-9]/g, '');

    if (value === "") {
        input.value = "";
        return;
    }

    input.value = new Intl.NumberFormat('en-US').format(value);
}

function proses(adm, btn) {
    let input = document.getElementById("nominal").value.replace(/,/g, '');

    if (!input) return;

    let nominal = parseInt(input);
    let hasil = nominal - adm;

    if (isNaN(hasil) || hasil < 0) {
        return;
    }

    let hasilFormat = new Intl.NumberFormat('en-US').format(hasil);

    document.getElementById("hasilText").innerText = "Rp " + hasilFormat;

    navigator.clipboard.writeText(hasilFormat);

    // 🔥 ubah jadi hijau
    btn.classList.add("success");

let teksAwal = btn.innerText;
btn.innerText = "✔";

setTimeout(() => {
    btn.classList.remove("success");
    btn.innerText = teksAwal;
}, 1500);
}

function resetButton(btn, adm) {
    if (adm === 6500) {
        btn.innerText = "COPY ADM 6,500";
    } else {
        btn.innerText = "COPY ADM 2,500";
    }
}

function showToast(text) {
    let toast = document.getElementById("toast");
    toast.innerText = text;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}
</script>

</body>
</html>
